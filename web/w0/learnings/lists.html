<!DOCTYPE html>
<html>

<head>
  <title>Lists!</title>
</head>

<body>
  This is an ordered list:
  <ol>
    <li>This is the first item.</li>
    <li>This is the second one.</li>
  </ol>
  This is an unordered one:
  <ul>
    <li>This is an unordered list's first item.</li>
    <li>This is another unordered list's item.</li>
  </ul>
</body>

</html>
